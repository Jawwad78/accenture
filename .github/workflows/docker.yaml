name: build and push docker image to ecr
on:
  workflow_dispatch:

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_ECR_REPO: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-west-2.amazonaws.com/accenture
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write #  it allows github to make the oidc token
  contents: read  #allows this pipeline to read files in this github repo

jobs:
  build-and-push: 
    runs-on: ubuntu-latest
    steps: 
      - name: checks out code
        uses: actions/checkout@v4
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v3
        with : 
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/oidc_ecs_permissions   
          aws-region: ${{ env.AWS_REGION }}

          
      - name: Build image
        id: build-image 
        run: |
         docker build -f ./app/dockerfile -t $AWS_ECR_REPO:$IMAGE_TAG ./app  
         echo "image=$AWS_ECR_REPO:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.build-image.outputs.image }}
          format: 'table'
          exit-code: 0
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true #if there are no updated patches of the version, it will ignore it 
        
      - name: login to ecr
        uses: aws-actions/amazon-ecr-login@v2  
        
      - name: push image
        id: push-image    
        run:
         docker push ${{ steps.build-image.outputs.image }}
 

